name: Deploy to TestFlight

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.2.app || sudo xcode-select -s /Applications/Xcode_16.3.app || sudo xcode-select -s /Applications/Xcode_16.app || true

      - name: Show Xcode version
        run: |
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-version || true

      - name: Download iOS Platform
        run: |
          echo "=== Available SDKs ==="
          xcodebuild -showsdks 2>&1 || true
          echo "=== Downloading iOS Platform ==="
          xcodebuild -downloadPlatform iOS 2>&1
          echo "=== iOS SDK Path ==="
          xcrun --sdk iphoneos --show-sdk-path 2>&1 || true

      - name: Install Distribution Certificate
        env:
          P12_BASE64: ${{ secrets.DISTRIBUTION_CERTIFICATE_P12 }}
          P12_PASSWORD: ${{ secrets.DISTRIBUTION_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          security create-keychain -p "temp_password" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "temp_password" $KEYCHAIN_PATH
          security list-keychains -d user -s $KEYCHAIN_PATH login.keychain
          echo "$P12_BASE64" | base64 --decode > $RUNNER_TEMP/distribution.p12
          security import $RUNNER_TEMP/distribution.p12 \
            -k $KEYCHAIN_PATH \
            -P "$P12_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/xcodebuild
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "temp_password" $KEYCHAIN_PATH

      - name: Install Provisioning Profiles
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"

          # WatchKit profile UUID: 1d1e7d90-0e4f-42e6-b4a8-07a6cfd49de8
          echo "${{ secrets.PROVISIONING_PROFILE }}" | base64 --decode > \
            "${PROFILES_DIR}/1d1e7d90-0e4f-42e6-b4a8-07a6cfd49de8.mobileprovision"

          # iOS Main profile UUID: ba89b494-bf79-4d03-823c-c18797ae6c65
          echo "${{ secrets.IOS_PROVISIONING_PROFILE }}" | base64 --decode > \
            "${PROFILES_DIR}/ba89b494-bf79-4d03-823c-c18797ae6c65.mobileprovision"

          echo "Installed profiles:"
          ls "$PROFILES_DIR"

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Deploy via Fastlane
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
          TEAM_ID: ${{ secrets.TEAM_ID }}
          MATCH_PASSWORD: ""
        run: bundle exec fastlane beta
