name: Deploy to TestFlight

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 15
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Install Distribution Certificate
        env:
          P12_BASE64: ${{ secrets.DISTRIBUTION_CERTIFICATE_P12 }}
          P12_PASSWORD: ${{ secrets.DISTRIBUTION_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          security create-keychain -p "temp_password" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "temp_password" $KEYCHAIN_PATH
          security list-keychains -d user -s $KEYCHAIN_PATH login.keychain
          echo "$P12_BASE64" | base64 --decode > $RUNNER_TEMP/distribution.p12
          security import $RUNNER_TEMP/distribution.p12 \
            -k $KEYCHAIN_PATH \
            -P "$P12_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/xcodebuild
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "temp_password" $KEYCHAIN_PATH

      - name: Install Provisioning Profiles
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          PROFILES_DIR=~/Library/MobileDevice/Provisioning\ Profiles

          # Decode watch profile and extract UUID
          echo "${{ secrets.PROVISIONING_PROFILE }}" | base64 --decode > /tmp/watch.mobileprovision
          WATCH_UUID=$(python3 -c "
          import plistlib, sys
          with open('/tmp/watch.mobileprovision','rb') as f: data=f.read()
          start=data.find(b'<?xml'); end=data.find(b'</plist>')+8
          p=plistlib.loads(data[start:end])
          print(p['UUID'])
          ")
          cp /tmp/watch.mobileprovision "${PROFILES_DIR}/${WATCH_UUID}.mobileprovision"

          # Decode iOS profile and extract UUID
          echo "${{ secrets.IOS_PROVISIONING_PROFILE }}" | base64 --decode > /tmp/ios.mobileprovision
          IOS_UUID=$(python3 -c "
          import plistlib, sys
          with open('/tmp/ios.mobileprovision','rb') as f: data=f.read()
          start=data.find(b'<?xml'); end=data.find(b'</plist>')+8
          p=plistlib.loads(data[start:end])
          print(p['UUID'])
          ")
          cp /tmp/ios.mobileprovision "${PROFILES_DIR}/${IOS_UUID}.mobileprovision"

          echo "Installed: ${WATCH_UUID}.mobileprovision, ${IOS_UUID}.mobileprovision"
          ls "$PROFILES_DIR"

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Deploy via Fastlane
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
          TEAM_ID: ${{ secrets.TEAM_ID }}
          MATCH_PASSWORD: ""
        run: bundle exec fastlane beta
