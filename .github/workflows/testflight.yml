name: Deploy to TestFlight

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 15
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Install Distribution Certificate
        env:
          P12_BASE64: ${{ secrets.DISTRIBUTION_CERTIFICATE_P12 }}
          P12_PASSWORD: ${{ secrets.DISTRIBUTION_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          security create-keychain -p "temp_password" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "temp_password" $KEYCHAIN_PATH
          security list-keychains -d user -s $KEYCHAIN_PATH login.keychain
          echo "$P12_BASE64" | base64 --decode > $RUNNER_TEMP/distribution.p12
          security import $RUNNER_TEMP/distribution.p12 \
            -k $KEYCHAIN_PATH \
            -P "$P12_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/xcodebuild
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "temp_password" $KEYCHAIN_PATH

      - name: Install Provisioning Profiles
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"

          install_profile() {
            local secret_b64="$1"
            local tmp_file="$2"
            echo "$secret_b64" | base64 --decode > "$tmp_file"
            # Extract UUID using security cms to decode the CMS-signed file
            local uuid
            uuid=$(security cms -D -i "$tmp_file" 2>/dev/null | plutil -extract UUID raw - 2>/dev/null)
            if [ -z "$uuid" ]; then
              echo "ERROR: Could not extract UUID from $tmp_file"
              exit 1
            fi
            cp "$tmp_file" "${PROFILES_DIR}/${uuid}.mobileprovision"
            echo "Installed: ${uuid}.mobileprovision"
          }

          install_profile "${{ secrets.PROVISIONING_PROFILE }}" /tmp/watch.mobileprovision
          install_profile "${{ secrets.IOS_PROVISIONING_PROFILE }}" /tmp/ios.mobileprovision
          ls "$PROFILES_DIR"

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Deploy via Fastlane
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
          TEAM_ID: ${{ secrets.TEAM_ID }}
          MATCH_PASSWORD: ""
        run: bundle exec fastlane beta
