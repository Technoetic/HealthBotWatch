name: Deploy to TestFlight

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          # 최신 Xcode 사용 (iOS 26 / watchOS 26 SDK 지원)
          ls /Applications/Xcode*.app/Contents/Developer 2>/dev/null | head -20 || true
          LATEST_XCODE=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          if [ -n "$LATEST_XCODE" ]; then
            sudo xcode-select -s "$LATEST_XCODE"
            echo "Using $LATEST_XCODE"
          else
            echo "Using default Xcode"
          fi

      - name: Show Xcode version
        run: |
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-version || true

      - name: Setup Platforms
        run: |
          echo "=== Xcode info ==="
          xcode-select -p
          xcodebuild -version
          echo "=== Available SDKs ==="
          xcodebuild -showsdks 2>&1 || true
          echo "=== iOS Simulators ==="
          xcrun simctl list runtimes 2>&1 | head -20 || true
          echo "=== Downloading watchOS Platform ==="
          xcodebuild -downloadPlatform watchOS 2>&1 || echo "watchOS done"
          echo "=== Downloading iOS Platform ==="
          xcodebuild -downloadPlatform iOS 2>&1 || echo "iOS done"
          echo "=== Done ==="

      - name: Install Distribution Certificate
        env:
          P12_BASE64: ${{ secrets.DISTRIBUTION_CERTIFICATE_P12 }}
          P12_PASSWORD: ${{ secrets.DISTRIBUTION_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          security create-keychain -p "temp_password" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "temp_password" $KEYCHAIN_PATH
          security list-keychains -d user -s $KEYCHAIN_PATH login.keychain
          echo "$P12_BASE64" | base64 --decode > $RUNNER_TEMP/distribution.p12
          security import $RUNNER_TEMP/distribution.p12 \
            -k $KEYCHAIN_PATH \
            -P "$P12_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/xcodebuild
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "temp_password" $KEYCHAIN_PATH

      - name: Prepare Provisioning Profiles Dir
        run: mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Build Ad Hoc IPA
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
          TEAM_ID: ${{ secrets.TEAM_ID }}
          MATCH_PASSWORD: ""
        run: bundle exec fastlane adhoc

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: HealthBotWatch-AdHoc-IPA
          path: "*.ipa"
