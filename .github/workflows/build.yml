name: Build watchOS App

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14  # Apple Silicon Mac, Xcode 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 15
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build watchOS App (Simulator)
        run: |
          xcodebuild \
            -project HealthBotWatch.xcodeproj \
            -scheme HealthBotWatch \
            -destination 'platform=watchOS Simulator,name=Apple Watch Series 9 (45mm)' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            clean build \
            | xcpretty || xcodebuild \
            -project HealthBotWatch.xcodeproj \
            -scheme HealthBotWatch \
            -destination 'platform=watchOS Simulator,name=Apple Watch Series 9 (45mm)' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            clean build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: HealthBotWatch-build
          path: build/
          retention-days: 7
